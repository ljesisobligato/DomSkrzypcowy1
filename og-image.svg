<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e1829"/>
      <stop offset="60%" stop-color="#243154"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="50%">
      <stop offset="0%" stop-color="#b8965a" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#b8965a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Decorative violin silhouette -->
  <g transform="translate(900, 90) scale(0.9)" opacity="0.12">
    <ellipse cx="0" cy="80" rx="60" ry="90" fill="none" stroke="#d4b07a" stroke-width="3"/>
    <ellipse cx="0" cy="280" rx="80" ry="110" fill="none" stroke="#d4b07a" stroke-width="3"/>
    <path d="M-58 80 Q-50 180 -45 230" stroke="#d4b07a" stroke-width="3" fill="none"/>
    <path d="M58 80 Q50 180 45 230" stroke="#d4b07a" stroke-width="3" fill="none"/>
    <rect x="-12" y="-30" width="24" height="120" rx="6" fill="none" stroke="#d4b07a" stroke-width="3"/>
    <line x1="0" y1="-30" x2="0" y2="370" stroke="#d4b07a" stroke-width="1"/>
  </g>

  <!-- Logo monogram -->
  <g transform="translate(120, 200)">
    <circle cx="60" cy="60" r="58" fill="none" stroke="#b8965a" stroke-width="3"/>
    <text x="60" y="80" font-family="Georgia, serif" font-size="62" font-style="italic" fill="#b8965a" text-anchor="middle" font-weight="500">JS</text>
  </g>

  <!-- Tagline -->
  <text x="120" y="400" font-family="Georgia, serif" font-size="56" fill="#ffffff" font-weight="500" letter-spacing="2">Dom Skrzypcowy</text>
  <text x="120" y="445" font-family="Georgia, serif" font-size="28" fill="#d4b07a" font-style="italic" letter-spacing="6">J&amp;S FINE VIOLINS</text>

  <!-- Subtitle -->
  <line x1="120" y1="490" x2="240" y2="490" stroke="#b8965a" stroke-width="2"/>
  <text x="120" y="535" font-family="Georgia, serif" font-size="22" fill="#a8a8a8" font-style="italic">Instrumenty od XVII wieku &middot; Wrocław</text>
</svg>
